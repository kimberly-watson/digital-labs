# ── Port 80: Lab Portal + Lab Tutor proxy ─────────────────────────────────────
# (written to /etc/nginx/conf.d/digital-labs.conf by user_data.sh)

# Route /chat to the Lab Tutor proxy on port 8090
location /chat {
    proxy_pass         http://127.0.0.1:8090/chat;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 60s;
}

# Serve the injected widget JS
location /lab-tutor-widget.js {
    alias /var/www/html/lab-tutor-widget.js;
    add_header Content-Type "application/javascript";
    add_header Access-Control-Allow-Origin "*";
}

# Route /tutor to the Lab Tutor proxy (serves tutor.html)
location /tutor {
    proxy_pass         http://127.0.0.1:8090/;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
}
