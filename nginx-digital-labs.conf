# Rate limit zone declaration (http context — must be outside server block).
# 10 requests/minute per IP on /chat. Zone size 1m ≈ 16,000 IPs tracked.
limit_req_zone $binary_remote_addr zone=chat_limit:1m rate=10r/m;

server {
    listen 80 default_server;

    # Block all non-browser clients (curl, wget, python, httpie, Postman, etc.)
    if ($block_non_browser) {
        return 403 "Browser access only.";
    }

    # Lab tutor chat API - Referer check so it can only be called from our own pages
    location /chat {
        # Rate limit: 10 requests/minute per IP, burst of 5
        limit_req zone=chat_limit burst=5 nodelay;
        limit_req_status 429;

        valid_referers server_names ~\.;
        if ($invalid_referer) {
            return 403;
        }
        proxy_pass http://127.0.0.1:8090/chat;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Lab Tutor standalone popup window
    location = /tutor {
        alias /var/www/html/tutor.html;
        add_header Content-Type "text/html; charset=utf-8";
        add_header X-Frame-Options "SAMEORIGIN";
    }

    # Beacon JS
    location /lab-tutor-beacon.js {
        alias /var/www/html/lab-tutor-beacon.js;
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header Access-Control-Allow-Origin "*";
    }

    # Portal / countdown clock
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
