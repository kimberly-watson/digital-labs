# Browser enforcement map - flip logic: non-browsers get "1" (truthy), browsers get "0" (falsy)
# This allows using "if ($block_non_browser)" which is the reliable nginx pattern.
# All real browsers (Chrome, Firefox, Safari, Edge, Opera) send Mozilla-compatible User-Agent.
# Blocks: curl, wget, python-requests, httpie, Postman, and other CLI/API tools.
map $http_user_agent $block_non_browser {
    default      1;
    "~*Mozilla"  0;
}
