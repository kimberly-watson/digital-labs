<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="300">
  <title>Sonatype Digital Lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #090B2F;
      color: #FBFCFA;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0;
    }
    .top-bar {
      width: 100%;
      background: #090B2F;
      border-bottom: 2px solid #2D36EC;
      padding: 16px 32px;
      display: flex;
      align-items: center;
    }
    .sonatype-logo { display: block; }
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 2rem 3rem;
      width: 100%;
    }
    h1 { font-size: 1.7rem; font-weight: 700; color: #FBFCFA; margin-bottom: 0.4rem; text-align: center; }
    .subtitle { color: #F1F5ED; margin-bottom: 2.5rem; font-size: 0.95rem; text-align: center; opacity: 0.75; }
    .clock { display: flex; gap: 1.5rem; margin-bottom: 0.75rem; }
    .unit {
      text-align: center;
      background: #0d1245;
      border: 2px solid #2D36EC;
      border-radius: 14px;
      padding: 1.4rem 2rem;
      min-width: 100px;
      transition: border-color 0.3s, background 0.3s;
    }
    .unit.warning { border-color: #FE572A; background: #1a0a06; }
    .number { font-size: 3.2rem; font-weight: 800; line-height: 1; color: #DAFF02; }
    .unit.warning .number { color: #FE572A; }
    .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #2D36EC; margin-top: 0.5rem; font-weight: 600; }
    .warning-msg { color: #FE572A; font-weight: 700; margin-bottom: 1.25rem; font-size: 0.9rem; text-align: center; min-height: 1.4rem; }
    .links { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; width: 100%; max-width: 500px; }
    .link-card {
      background: #0d1245;
      border: 2px solid #2D36EC;
      border-radius: 14px;
      padding: 1.4rem 1rem;
      text-align: center;
      color: #FBFCFA;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
    }
    .link-card:hover { border-color: #DAFF02; background: #111840; transform: translateY(-2px); }
    .link-card .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .link-card .name { font-size: 0.95rem; font-weight: 700; color: #2D36EC; margin-bottom: 0.25rem; }
    .link-card .desc { font-size: 0.75rem; color: #F1F5ED; opacity: 0.7; }
    .creds {
      background: #0d1245;
      border: 1px solid #2D36EC;
      border-radius: 10px;
      padding: 0.9rem 1.6rem;
      font-size: 0.85rem;
      color: #F1F5ED;
      text-align: center;
      margin-bottom: 1rem;
    }
    .creds strong { color: #DAFF02; font-family: monospace; font-size: 1rem; }
    .expires { font-size: 0.78rem; color: #F1F5ED; opacity: 0.45; }
    #chat-bubble {
      position: fixed; bottom: 2rem; right: 2rem;
      height: 48px; border-radius: 24px;
      background: #FE572A; border: none; cursor: pointer;
      font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0 1.25rem;
      box-shadow: 0 4px 20px rgba(254,87,42,0.5); z-index: 1000;
      color: #FBFCFA;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #chat-bubble:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(254,87,42,0.65); }
    #chat-window {
      position: fixed; bottom: 5.5rem; right: 2rem;
      width: 390px; max-height: 540px;
      background: #090B2F; border: 2px solid #2D36EC;
      border-radius: 18px; display: none; flex-direction: column;
      box-shadow: 0 8px 40px rgba(45,54,236,0.3); z-index: 999; overflow: hidden;
    }
    #chat-window.open { display: flex; }
    #chat-header {
      background: #2D36EC; padding: 1rem 1.2rem;
      font-weight: 700; font-size: 0.95rem; color: #FBFCFA;
      display: flex; justify-content: space-between; align-items: center;
    }
    #chat-close { background: none; border: none; color: rgba(255,255,255,0.8); cursor: pointer; font-size: 1.2rem; line-height: 1; }
    #chat-messages {
      flex: 1; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.75rem;
      min-height: 280px; max-height: 370px;
    }
    .msg { max-width: 85%; padding: 0.65rem 1rem; border-radius: 14px; font-size: 0.88rem; line-height: 1.55; }
    .msg.user { background: #FE572A; align-self: flex-end; color: #FBFCFA; border-bottom-right-radius: 4px; }
    .msg.assistant { background: #0d1245; border: 1px solid #2D36EC; align-self: flex-start; color: #F1F5ED; border-bottom-left-radius: 4px; }
    .msg.thinking { color: #2D36EC; font-style: italic; background: transparent; border: none; }
    #chat-input-row { display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid #2D36EC; }
    #chat-input {
      flex: 1; background: #0d1245; border: 1px solid #2D36EC;
      border-radius: 10px; padding: 0.55rem 0.75rem;
      color: #FBFCFA; font-size: 0.88rem; resize: none; outline: none;
    }
    #chat-input::placeholder { color: rgba(241,245,237,0.4); }
    #chat-send {
      background: #FE572A; border: none; border-radius: 10px;
      padding: 0.55rem 1rem; color: #FBFCFA; cursor: pointer;
      font-size: 0.88rem; font-weight: 700;
    }
    #chat-send:hover { background: #e04820; }
    #chat-send:disabled { background: #2D36EC; opacity: 0.4; cursor: not-allowed; }
  </style>
</head>

  <div class="main">
    <h1>Sonatype Digital Lab</h1>
    <p class="subtitle">Your hands-on lab environment</p>
    <div class="warning-msg" id="warn-msg"></div>
    <div class="clock">
      <div class="unit" id="unit-d"><div class="number" id="days">--</div><div class="label">Days</div></div>
      <div class="unit" id="unit-h"><div class="number" id="hours">--</div><div class="label">Hours</div></div>
      <div class="unit" id="unit-m"><div class="number" id="mins">--</div><div class="label">Minutes</div></div>
      <div class="unit" id="unit-s"><div class="number" id="secs">--</div><div class="label">Seconds</div></div>
    </div>
    <div class="links">
      <div class="link-card" id="nexus-card">
        <div class="icon">&#128230;</div>
        <div class="name">Nexus Repository</div>
        <div class="desc">Browse and manage artifacts</div>
      </div>
      <div class="link-card" id="iq-card">
        <div class="icon">&#128269;</div>
        <div class="name">IQ Server</div>
        <div class="desc">Lifecycle &amp; Firewall</div>
      </div>
    </div>
    <div class="creds">
      Username: <strong>admin</strong> &nbsp;&#183;&nbsp; Password: <strong>admin123</strong>
    </div>
    <div class="expires" id="expires-label"></div>
  </div>

  <button id="chat-bubble" onclick="openTutor()" title="Open Lab Tutor">&#129302; Use Lab Tutor</button>
  <div id="popup-blocked-msg" style="display:none;position:fixed;bottom:5.5rem;right:2rem;background:#090B2F;border:1px solid #2D36EC;border-radius:10px;padding:0.75rem 1rem;font-size:0.85rem;color:#FBFCFA;z-index:9999;max-width:260px;"></div>

  <script>
    const host = location.hostname;
    document.getElementById('nexus-card').onclick = function() { window.open('http://'+host+':8082','_blank'); };
    document.getElementById('iq-card').onclick   = function() { window.open('http://'+host+':8072','_blank'); };

    var tutorWin = null;
    function openTutor() {
      var url  = 'http://' + host + '/tutor';
      var winW = 440, winH = 640;
      var left = Math.max(0, screen.availWidth  - winW - 20);
      var top  = Math.max(0, Math.round((screen.availHeight - winH) / 2));
      var feat = 'width='+winW+',height='+winH+',left='+left+',top='+top
               + ',resizable=yes,scrollbars=no,location=no,toolbar=no,menubar=no,status=no';

      /* Check for existing window by name before opening a new one */
      var existing = null;
      try { existing = window.open('', 'LabTutor'); } catch(e) {}
      if (existing && !existing.closed) {
        try {
          if (existing.location.href && existing.location.href !== 'about:blank') {
            existing.focus(); tutorWin = existing; return;
          }
          existing.close();
        } catch(e) {
          existing.focus(); tutorWin = existing; return;
        }
      }

      tutorWin = window.open(url, 'LabTutor', feat);
      if (!tutorWin || tutorWin.closed || typeof tutorWin.closed === 'undefined') {
        var msg = document.getElementById('popup-blocked-msg');
        if (msg) {
          msg.innerHTML = 'Popup blocked. <a href="' + url + '" target="_blank" style="color:#DAFF02;font-weight:700;">Open Lab Tutor in new tab</a>';
          msg.style.display = 'block';
        }
      }
    }
    // Bring tutor to front whenever the user switches back to the portal

    const END_TIME = new Date("TERMINATION_PLACEHOLDER");
    const expiresEl = document.getElementById('expires-label');
    if (!isNaN(END_TIME.getTime())) {
      expiresEl.textContent = 'Lab expires: ' + END_TIME.toLocaleString('en-US', {
        weekday:'short', month:'short', day:'numeric',
        hour:'2-digit', minute:'2-digit', timeZoneName:'short'
      });
    }

    function pad(n) { return String(n).padStart(2,'0'); }
    function tick() {
      const diff = END_TIME - Date.now();
      const ids = ['unit-d','unit-h','unit-m','unit-s'];
      if (isNaN(END_TIME.getTime()) || diff <= 0) {
        ['days','hours','mins','secs'].forEach(function(id){ document.getElementById(id).textContent = '0'; });
        document.getElementById('warn-msg').textContent = 'Your lab has expired.';
        ids.forEach(function(id){ document.getElementById(id).classList.add('warning'); });
        return;
      }
      var warn = diff < 48 * 3600000;
      document.getElementById('days').textContent  = Math.floor(diff / 86400000);
      document.getElementById('hours').textContent = Math.floor(diff % 86400000 / 3600000);
      document.getElementById('mins').textContent  = pad(Math.floor(diff % 3600000 / 60000));
      document.getElementById('secs').textContent  = pad(Math.floor(diff % 60000 / 1000));
      ids.forEach(function(id){ document.getElementById(id).classList.toggle('warning', warn); });
      document.getElementById('warn-msg').textContent = warn ? '\u26a0 Lab expires in less than 48 hours \u2014 save your work!' : '';
    }
    tick(); setInterval(tick, 1000);
  </script>
