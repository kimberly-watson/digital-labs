<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sonatype Lab Tutor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    #chat-bubble { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; border-radius: 50%; background: #00b4d8; border: none; cursor: pointer; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,180,216,0.4); z-index: 1000; }
    #chat-window { position: fixed; bottom: 5.5rem; right: 2rem; width: 380px; max-height: 520px; background: #16213e; border: 1px solid #0f3460; border-radius: 16px; display: none; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 999; overflow: hidden; }
    #chat-window.open { display: flex; }
    #chat-header { background: #0f3460; padding: 1rem 1.2rem; font-weight: 600; font-size: 0.95rem; color: #00b4d8; display: flex; justify-content: space-between; align-items: center; }
    #chat-close { background: none; border: none; color: #aaa; cursor: pointer; font-size: 1.2rem; line-height: 1; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; min-height: 280px; max-height: 360px; }
    .msg { max-width: 85%; padding: 0.6rem 0.9rem; border-radius: 12px; font-size: 0.88rem; line-height: 1.5; }
    .msg.user { background: #0f3460; align-self: flex-end; color: #eee; }
    .msg.assistant { background: #1e3a5f; align-self: flex-start; color: #ddd; }
    .msg.thinking { color: #888; font-style: italic; }
    #chat-input-row { display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid #0f3460; }
    #chat-input { flex: 1; background: #0f3460; border: 1px solid #1a4a7a; border-radius: 8px; padding: 0.5rem 0.75rem; color: #eee; font-size: 0.88rem; resize: none; outline: none; }
    #chat-input::placeholder { color: #666; }
    #chat-send { background: #00b4d8; border: none; border-radius: 8px; padding: 0.5rem 0.9rem; color: #fff; cursor: pointer; font-size: 0.88rem; font-weight: 600; white-space: nowrap; }
    #chat-send:disabled { background: #444; cursor: not-allowed; }
    #welcome { text-align: center; padding: 3rem 2rem; }
    #welcome h1 { font-size: 1.5rem; color: #00b4d8; margin-bottom: 0.5rem; }
    #welcome p { color: #aaa; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div id="welcome">
    <h1>Sonatype Digital Lab</h1>
    <p>Click the chat bubble to ask your lab tutor a question.</p>
  </div>
  <button id="chat-bubble" onclick="toggleChat()" title="Ask the lab tutor">?</button>
  <div id="chat-window">
    <div id="chat-header">
      <span>Lab Tutor</span>
      <button id="chat-close" onclick="toggleChat()">&#x2715;</button>
    </div>
    <div id="chat-messages">
      <div class="msg assistant">Hi! I am your Sonatype lab tutor. Ask me anything about Nexus Repository, IQ Server, or your lab environment.</div>
    </div>
    <div id="chat-input-row">
      <textarea id="chat-input" rows="2" placeholder="Ask a question..." onkeydown="handleKey(event)"></textarea>
      <button id="chat-send" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script>
    const history = [];
    function toggleChat() { document.getElementById("chat-window").classList.toggle("open"); }
    function handleKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    async function sendMessage() {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      document.getElementById("chat-send").disabled = true;
      addMsg("user", text);
      history.push({ role: "user", content: text });
      const thinking = addMsg("assistant", "Thinking...", true);
      try {
        const resp = await fetch("/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages: history }) });
        const data = await resp.json();
        thinking.remove();
        addMsg("assistant", data.reply);
        history.push({ role: "assistant", content: data.reply });
      } catch(e) {
        thinking.remove();
        addMsg("assistant", "Sorry, I could not reach the tutor service. Please try again.");
      }
      document.getElementById("chat-send").disabled = false;
      input.focus();
    }
    function addMsg(role, text, thinking) {
      const div = document.createElement("div");
      div.className = "msg " + role + (thinking ? " thinking" : "");
      div.textContent = text;
      const msgs = document.getElementById("chat-messages");
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
